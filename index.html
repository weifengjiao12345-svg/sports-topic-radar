<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🏃 运动户外选题雷达</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    html { scroll-behavior: smooth; }
    [x-cloak] { display: none !important; }
    body { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; }

    /* ── 侧边栏 ── */
    .sidebar-item {
      transition: all 0.15s ease;
      cursor: pointer;
      border-left: 3px solid transparent;
    }
    .sidebar-item:hover { background: rgba(37,99,235,0.08); }
    .sidebar-item.active {
      background: rgba(37,99,235,0.12);
      border-left-color: #2563eb;
    }

    /* ── 卡片 ── */
    .topic-card {
      background: #fff;
      border-radius: 14px;
      border: 1px solid #e2eaf6;
      overflow: hidden;
      transition: box-shadow .2s, transform .15s;
    }
    .topic-card:hover {
      box-shadow: 0 6px 28px rgba(37,99,235,.10);
      transform: translateY(-2px);
    }

    /* 左侧色条 */
    .card-stripe { width: 4px; min-height: 100%; flex-shrink: 0; }
    .stripe-high { background: #2563eb; }
    .stripe-mid  { background: #60a5fa; }
    .stripe-low  { background: #93c5fd; }

    /* ── 热度 badge ── */
    .badge-high { background:#eff6ff; color:#1d4ed8; border:1px solid #bfdbfe; font-weight:700; }
    .badge-mid  { background:#f0f9ff; color:#0369a1; border:1px solid #bae6fd; font-weight:700; }
    .badge-low  { background:#f0fdf4; color:#15803d; border:1px solid #bbf7d0; font-weight:700; }

    /* ── 热度时间轴胶囊 ── */
    .heat-timeline {
      display: inline-flex; align-items: center; gap: 4px;
      background: #eff6ff; color: #1d4ed8;
      border: 1px solid #bfdbfe;
      border-radius: 20px; padding: 2px 10px;
      font-size: 0.72rem; font-weight: 600;
    }
    .heat-timeline.resurge {
      background: #fef3c7; color: #b45309;
      border-color: #fde68a;
    }

    /* ── 来源平台标签 ── */
    .platform-tag {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: 0.68rem; padding: 2px 8px;
      border-radius: 4px; font-weight: 600;
      text-decoration: underline;
      text-underline-offset: 2px;
      text-decoration-thickness: 1px;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      position: relative;
    }
    .platform-tag:hover { opacity: .7; transform: translateY(-1px); }
    .platform-tag::after {
      content: '点击查看原文';
      position: absolute; bottom: calc(100% + 5px); left: 50%; transform: translateX(-50%);
      background: #1e3a8a; color: #fff; font-size: 0.62rem; font-weight: 500;
      padding: 3px 7px; border-radius: 5px; white-space: nowrap;
      opacity: 0; pointer-events: none;
      transition: opacity .15s;
      text-decoration: none;
    }
    .platform-tag:hover::after { opacity: 1; }
    .pt-weibo   { background:#fff0f0; color:#c0392b; text-decoration-color:#f5a9a9; }
    .pt-xhs     { background:#fff0f1; color:#c0305a; text-decoration-color:#f5a9bc; }
    .pt-douyin  { background:#f5f5f5; color:#333;    text-decoration-color:#bbb; }
    .pt-hupu    { background:#fff7ec; color:#c05e00; text-decoration-color:#fdc88a; }
    .pt-zhihu   { background:#eef3ff; color:#1a56cc; text-decoration-color:#93b4f5; }
    .pt-weixin  { background:#eef8f1; color:#157a38; text-decoration-color:#7ed4a0; }
    .pt-baidu   { background:#eef2ff; color:#2044b0; text-decoration-color:#93b4f5; }
    .pt-default { background:#f0f4ff; color:#3b5ba5; text-decoration-color:#a5b4fc; }

    /* ── 标签颜色 ── */
    .tag-topic, .tag-emotion {
      background: #f0f4ff; color: #3b5ba5;
      border: 1px solid #c7d7fc;
    }
    .tag-platform {
      background: #fef9ec; color: #92600a;
      border: 1px solid #fde68a;
    }
    .tag-product {
      background: #f0fdf4; color: #166534;
      border: 1px solid #bbf7d0;
    }
    .tag-base {
      display: inline-block;
      border-radius: 4px; padding: 1px 8px;
      font-size: 0.7rem; margin: 2px;
    }

    /* ── 传播判断模块 ── */
    .propagation-block {
      background: #f8faff;
      border-radius: 10px;
      padding: 12px 14px;
      border: 1px solid #dbeafe;
    }
    .prop-row { display: flex; gap: 8px; align-items: flex-start; padding: 6px 0; }
    .prop-row + .prop-row { border-top: 1px dashed #dbeafe; }
    .prop-icon {
      width: 22px; height: 22px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; flex-shrink: 0; margin-top: 1px;
    }
    .prop-label {
      font-size: 0.63rem; font-weight: 800;
      letter-spacing: .06em; text-transform: uppercase;
      color: #93a8d4; margin-bottom: 1px;
    }
    .prop-content { font-size: 0.78rem; color: #374151; line-height: 1.6; }

    /* ── 内容形式推荐胶囊 ── */
    .format-pill {
      display: inline-flex; align-items: center; gap: 3px;
      background: #eff6ff; color: #1d4ed8;
      border: 1px solid #bfdbfe;
      border-radius: 20px; padding: 2px 9px;
      font-size: 0.68rem; font-weight: 600; margin: 2px;
    }

    /* ── 分区标题 ── */
    .section-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 16px;
    }
    .section-icon {
      width: 36px; height: 36px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    /* ── Banner 装饰纹理 ── */
    .banner-grid {
      background-image:
        linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    /* ── 统计卡片 ── */
    .stat-card {
      border-radius: 12px;
      padding: 14px 12px;
      text-align: center;
    }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .sidebar.open { display: block; }
    }
  </style>
</head>
<body class="bg-[#f0f5ff] text-slate-800 min-h-screen" x-data="radarApp()" x-cloak>

<!-- ══ 顶部导航 ══ -->
<header class="sticky top-0 z-50 bg-white border-b border-blue-100 shadow-sm">
  <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <button @click="sidebarOpen = !sidebarOpen" class="md:hidden p-2 rounded-lg hover:bg-blue-50 text-blue-400">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
      <div class="flex items-center gap-2.5">
        <div class="w-8 h-8 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black text-sm shadow-sm">⚡</div>
        <span class="text-base font-black tracking-tight text-slate-800">选题雷达</span>
        <span class="hidden sm:inline text-xs text-blue-500 bg-blue-50 px-2 py-0.5 rounded-full border border-blue-100 font-semibold">运动户外</span>
      </div>
    </div>
    <div class="flex items-center gap-2.5">
      <span class="text-xs bg-blue-50 text-blue-600 px-2.5 py-1 rounded-full font-bold border border-blue-100">
        共 <span x-text="archives.length"></span> 期
      </span>
      <span class="text-xs text-slate-400 hidden sm:inline" x-text="'更新于 ' + today"></span>
    </div>
  </div>
</header>

<div class="max-w-7xl mx-auto flex min-h-screen">

  <!-- ══ 左侧存档侧边栏 ══ -->
  <aside class="sidebar md:block w-56 shrink-0 bg-white border-r border-blue-100 sticky top-14 self-start h-[calc(100vh-56px)] overflow-y-auto"
    :class="sidebarOpen ? 'open fixed top-14 left-0 z-40 shadow-xl w-56 h-screen bg-white overflow-y-auto' : ''">
    <div class="p-4">
      <div class="text-xs font-black text-slate-400 uppercase tracking-widest mb-3 px-1">历史存档</div>
      <div class="space-y-0.5">
        <template x-for="(archive, idx) in archives" :key="archive.date">
          <div class="sidebar-item rounded-xl px-3 py-3"
            :class="currentIndex === idx ? 'active' : ''"
            @click="selectArchive(idx); sidebarOpen = false">
            <div class="flex items-center justify-between">
              <div>
                <div class="text-sm font-bold text-slate-700 leading-tight" x-text="archive.date"></div>
                <div class="text-xs text-slate-400 mt-0.5" x-text="archive.weekday + ' · ' + archive.updateTime + ' 更新'"></div>
              </div>
              <div class="flex flex-col items-end gap-1">
                <span x-show="idx === 0" class="text-xs bg-blue-600 text-white px-1.5 py-0.5 rounded-full font-bold leading-tight">最新</span>
                <span class="text-xs text-slate-300" x-text="archive.items + '条'"></span>
              </div>
            </div>
          </div>
        </template>
      </div>
    </div>
  </aside>

  <!-- 移动端遮罩 -->
  <div x-show="sidebarOpen" @click="sidebarOpen = false" class="fixed inset-0 z-30 bg-slate-900/40 md:hidden"></div>

  <!-- ══ 主内容区 ══ -->
  <main class="flex-1 min-w-0 p-4 md:p-7">

    <!-- 顶部 Banner -->
    <div class="mb-6 bg-gradient-to-br from-blue-700 to-blue-500 rounded-2xl p-6 text-white shadow-lg relative overflow-hidden banner-grid">
      <div class="absolute top-0 left-0 right-0 h-1 bg-white/20 rounded-t-2xl"></div>
      <div class="relative flex flex-col sm:flex-row sm:items-start sm:justify-between gap-3">
        <div>
          <div class="flex items-center gap-2 mb-2">
            <span class="text-xs bg-white/20 text-white px-2 py-0.5 rounded font-bold uppercase tracking-wider backdrop-blur">LIVE</span>
            <span class="text-xs text-white/60">过去24小时热点追踪</span>
          </div>
          <h1 class="text-2xl font-black mb-1 tracking-tight leading-tight">运动户外选题雷达</h1>
          <p class="text-white/60 text-sm">装备 · 赛事 · 消费 · 户外 · 全网舆情扫描</p>
        </div>
        <div class="text-right shrink-0">
          <div class="text-2xl font-black text-white/95 tabular-nums" x-text="current.date"></div>
          <div class="text-white/50 text-xs mt-0.5" x-text="current.weekday + ' · 编辑更新 ' + current.updateTime"></div>
        </div>
      </div>

      <!-- 编辑提示 -->
      <div class="mt-4 bg-white/10 backdrop-blur rounded-xl p-4 border border-white/15" x-show="current.editorNote">
        <div class="font-bold mb-1.5 text-white/80 flex items-center gap-1.5 text-xs uppercase tracking-wider">
          <span class="w-1.5 h-1.5 bg-yellow-300 rounded-full inline-block"></span>
          编辑提示
        </div>
        <div class="text-white/70 leading-relaxed text-xs" x-text="current.editorNote"></div>
        <div class="mt-2.5 flex flex-wrap gap-1.5" x-show="current.keywords && current.keywords.length">
          <template x-for="kw in current.keywords">
            <span class="bg-white/15 text-white/80 text-xs px-2 py-0.5 rounded-full border border-white/20 font-medium" x-text="kw"></span>
          </template>
        </div>
      </div>
    </div>

    <!-- 统计栏：3格 -->
    <div class="grid grid-cols-3 gap-3 mb-6">
      <div class="stat-card bg-white border border-blue-100 shadow-sm">
        <div class="text-2xl font-black text-blue-700 tabular-nums" x-text="countByLevel('high')"></div>
        <div class="text-xs text-slate-400 mt-1 font-semibold">高热度</div>
      </div>
      <div class="stat-card bg-white border border-blue-100 shadow-sm">
        <div class="text-2xl font-black text-sky-500 tabular-nums" x-text="countByLevel('mid')"></div>
        <div class="text-xs text-slate-400 mt-1 font-semibold">中热度</div>
      </div>
      <div class="stat-card bg-white border border-blue-100 shadow-sm">
        <div class="text-2xl font-black text-emerald-500 tabular-nums" x-text="countByLevel('low')"></div>
        <div class="text-xs text-slate-400 mt-1 font-semibold">观察中</div>
      </div>
    </div>

    <!-- ══ 选题目录 ══ -->
    <div class="mb-7 bg-white rounded-2xl border border-blue-100 shadow-sm overflow-hidden">
      <div class="flex items-center justify-between px-5 py-3.5 border-b border-blue-50">
        <div class="flex items-center gap-2">
          <span class="text-sm font-black text-slate-700">📋 今日选题目录</span>
          <span class="text-xs text-slate-400 font-medium" x-text="'共 ' + (hotItems.length + watchItems.length) + ' 条'"></span>
        </div>
        <button @click="tocOpen = !tocOpen"
          class="text-xs text-blue-400 hover:text-blue-600 font-semibold transition-colors flex items-center gap-1">
          <span x-text="tocOpen ? '收起' : '展开'"></span>
          <svg class="w-3.5 h-3.5 transition-transform duration-200" :class="tocOpen ? 'rotate-180' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"/>
          </svg>
        </button>
      </div>
      <div x-show="tocOpen" x-transition:enter="transition ease-out duration-150" x-transition:enter-start="opacity-0 -translate-y-1" x-transition:enter-end="opacity-100 translate-y-0">
        <!-- 🔥 已热起来 -->
        <div class="px-5 pt-3.5 pb-1" x-show="hotItems.length > 0">
          <div class="flex items-center gap-1.5 mb-2">
            <span class="w-2 h-2 rounded-full bg-blue-600 inline-block"></span>
            <span class="text-xs font-black text-blue-600 uppercase tracking-wider">已热起来</span>
            <span class="text-xs text-slate-300 font-medium" x-text="hotItems.length + ' 条'"></span>
          </div>
          <div class="space-y-1.5">
            <template x-for="(item, idx) in hotItems" :key="'toc-hot-' + item.id">
              <a :href="'#card-' + item.id"
                class="flex items-start gap-2.5 group py-1 px-2 rounded-lg hover:bg-blue-50 transition-colors cursor-pointer"
                @click.prevent="document.getElementById('card-' + item.id)?.scrollIntoView({behavior:'smooth', block:'center'})">
                <span class="text-xs font-black text-slate-300 tabular-nums mt-0.5 shrink-0 w-5" x-text="'#' + String(idx+1).padStart(2,'0')"></span>
                <span class="text-xs px-1.5 py-0.5 rounded shrink-0 mt-0.5" :class="'badge-' + item.level" x-text="item.levelLabel"></span>
                <span class="text-xs text-slate-600 leading-snug group-hover:text-blue-700 transition-colors line-clamp-1 flex-1" x-text="item.title"></span>
              </a>
            </template>
          </div>
        </div>
        <!-- 👀 潜力盯 -->
        <div class="px-5 pt-2.5 pb-3.5" x-show="watchItems.length > 0">
          <div class="flex items-center gap-1.5 mb-2">
            <span class="w-2 h-2 rounded-full bg-sky-400 inline-block"></span>
            <span class="text-xs font-black text-sky-500 uppercase tracking-wider">值得盯</span>
            <span class="text-xs text-slate-300 font-medium" x-text="watchItems.length + ' 条'"></span>
          </div>
          <div class="space-y-1.5">
            <template x-for="(item, idx) in watchItems" :key="'toc-watch-' + item.id">
              <a :href="'#card-' + item.id"
                class="flex items-start gap-2.5 group py-1 px-2 rounded-lg hover:bg-sky-50 transition-colors cursor-pointer"
                @click.prevent="document.getElementById('card-' + item.id)?.scrollIntoView({behavior:'smooth', block:'center'})">
                <span class="text-xs font-black text-slate-300 tabular-nums mt-0.5 shrink-0 w-5" x-text="'#' + String(hotItems.length + idx + 1).padStart(2,'0')"></span>
                <span class="text-xs px-1.5 py-0.5 rounded shrink-0 mt-0.5" :class="'badge-' + item.level" x-text="item.levelLabel"></span>
                <span class="text-xs text-slate-600 leading-snug group-hover:text-sky-700 transition-colors line-clamp-1 flex-1" x-text="item.title"></span>
              </a>
            </template>
          </div>
        </div>
      </div>
    </div>

    <!-- ══ 第一部分：已热起来 ══ -->
    <section class="mb-8" x-show="hotItems.length > 0">
      <div class="section-header">
        <div class="section-icon bg-blue-600">🔥</div>
        <div>
          <h2 class="text-sm font-black text-slate-700 uppercase tracking-wider">已经热起来的</h2>
          <p class="text-xs text-slate-400 mt-0.5">当前已确认热度的选题</p>
        </div>
        <span class="ml-auto text-xs bg-blue-600 text-white px-2.5 py-1 rounded-full font-bold" x-text="hotItems.length + ' 条'"></span>
      </div>

      <div class="space-y-3">
        <template x-for="(item, idx) in hotItems" :key="item.id">
          <div class="topic-card flex" :id="'card-' + item.id">
            <div class="card-stripe" :class="'stripe-' + item.level"></div>
            <div class="flex-1 p-5">

              <!-- 行1：序号 + badge + 平台 -->
              <div class="flex flex-wrap items-center gap-2 mb-2.5">
                <span class="text-xs font-black text-slate-300 tabular-nums" x-text="'#' + String(idx+1).padStart(2,'0')"></span>
                <span class="text-xs px-2.5 py-0.5 rounded-full" :class="'badge-' + item.level" x-text="item.levelLabel"></span>
                <template x-for="src in item.sources">
                  <a :href="src.url" target="_blank" rel="noopener" class="platform-tag" :class="src.cls">
                    <span x-text="src.icon"></span>
                    <span x-text="src.name"></span>
                    <span class="opacity-40">↗</span>
                  </a>
                </template>
              </div>

              <!-- 标题 + 时间线 -->
              <div class="flex items-start justify-between gap-3 mb-3">
                <h3 class="font-black text-slate-900 leading-snug text-base flex-1" x-text="item.title"></h3>
                <span class="heat-timeline shrink-0 mt-0.5" :class="item.heatInfo.type === 'resurge' ? 'resurge' : ''">
                  <span x-text="item.heatInfo.type === 'resurge' ? '🔁' : '🗓'"></span>
                  <span x-text="item.heatInfo.label"></span>
                </span>
              </div>

              <!-- 导语 -->
              <p class="text-sm text-slate-500 leading-relaxed mb-3 border-l-2 border-blue-400 pl-3 bg-blue-50/60 py-2 rounded-r-lg" x-text="item.summary"></p>

              <!-- 标签 -->
              <div class="flex flex-wrap gap-0.5 mb-4">
                <template x-for="tag in item.tags">
                  <span class="tag-base" :class="'tag-' + tag.type" x-text="'#' + tag.text"></span>
                </template>
              </div>

              <!-- 传播判断 -->
              <div class="propagation-block">
                <div class="text-xs font-black text-blue-300 uppercase tracking-widest mb-2.5 flex items-center gap-1.5">
                  <span class="w-1 h-3 bg-blue-500 rounded-full inline-block"></span>
                  传播判断
                </div>
                <div class="prop-row">
                  <div class="prop-icon bg-blue-50">😤</div>
                  <div>
                    <div class="prop-label">情绪 / 矛盾点</div>
                    <div class="prop-content" x-text="item.propagation.emotion"></div>
                  </div>
                </div>
                <div class="prop-row">
                  <div class="prop-icon bg-blue-50">💡</div>
                  <div>
                    <div class="prop-label">参与动机</div>
                    <div class="prop-content" x-text="item.propagation.motivation"></div>
                  </div>
                </div>
                <div class="prop-row">
                  <div class="prop-icon bg-blue-50">✍️</div>
                  <div>
                    <div class="prop-label">推荐内容形式</div>
                    <div class="flex flex-wrap mt-1">
                      <template x-for="fmt in item.propagation.formats">
                        <span class="format-pill" x-text="fmt"></span>
                      </template>
                    </div>
                  </div>
                </div>
              </div>

            </div>
          </div>
        </template>
      </div>
    </section>

    <!-- ══ 第二部分：潜力盯选题 ══ -->
    <section class="mb-8" x-show="watchItems.length > 0">
      <div class="section-header">
        <div class="section-icon bg-sky-500">👀</div>
        <div>
          <h2 class="text-sm font-black text-slate-700 uppercase tracking-wider">还没彻底爆，但很值得盯</h2>
          <p class="text-xs text-slate-400 mt-0.5">潜力型选题，可提前布局</p>
        </div>
        <span class="ml-auto text-xs bg-sky-500 text-white px-2.5 py-1 rounded-full font-bold" x-text="watchItems.length + ' 条'"></span>
      </div>

      <div class="space-y-3">
        <template x-for="(item, idx) in watchItems" :key="item.id">
          <div class="topic-card flex" :id="'card-' + item.id">
            <div class="card-stripe" :class="'stripe-' + item.level"></div>
            <div class="flex-1 p-5">

              <!-- 行1：序号 + badge + 平台 -->
              <div class="flex flex-wrap items-center gap-2 mb-2.5">
                <span class="text-xs font-black text-slate-300 tabular-nums" x-text="'#' + String(hotItems.length + idx + 1).padStart(2,'0')"></span>
                <span class="text-xs px-2.5 py-0.5 rounded-full" :class="'badge-' + item.level" x-text="item.levelLabel"></span>
                <template x-for="src in item.sources">
